name: Build module

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Exposed so steps can detect whether signing secrets are available.
      # Secrets are absent on PRs from forks; those builds stay unsigned.
      SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
      SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
      SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
      SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read version from module.prop
        id: ver
        run: echo "version=$(grep '^version=' module.prop | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Validate module.prop
        run: |
          for k in id name version versionCode author description; do
            grep -q "^$k=" module.prop || { echo "module.prop missing $k"; exit 1; }
          done

      - name: Decode signing keystore
        if: env.SIGNING_KEYSTORE_BASE64 != ''
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/rootfix.jks"
          echo "SIGNING_KEYSTORE_FILE=$RUNNER_TEMP/rootfix.jks" >> "$GITHUB_ENV"

      - name: Build signed zip
        if: env.SIGNING_KEYSTORE_BASE64 != ''
        run: ./gradlew --no-daemon signZip verifyZip

      - name: Build unsigned zip (no signing secrets)
        if: env.SIGNING_KEYSTORE_BASE64 == ''
        run: ./gradlew --no-daemon zipModule

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfix-${{ steps.ver.outputs.version }}
          path: build/*.zip
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.zip
