name: Build module

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from module.prop
        id: ver
        run: echo "version=$(grep '^version=' module.prop | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Validate module.prop
        run: |
          for k in id name version versionCode author description; do
            grep -q "^$k=" module.prop || { echo "module.prop missing $k"; exit 1; }
          done

      - name: Zip module
        run: |
          zip -r9 "rootfix-${{ steps.ver.outputs.version }}.zip" . \
            -x ".git/*" ".github/*" "*.md" "update.json" ".gitignore" "LICENSE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfix-${{ steps.ver.outputs.version }}
          path: "*.zip"

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
